version: '3.8'

services:
  # Karigar backend router
  karigar-server:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: '3000'
      HOST: '0.0.0.0'
      COLAB_BASEURL: http://ollama-1:11434
      KAGGLE_BASEURL: http://ollama-2:11434
      ORACLE_BASEURL: http://ollama-3:11434
    depends_on:
      - ollama-1
      - ollama-2
      - ollama-3
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - karigar

  # Mock Colab worker (T4)
  ollama-1:
    image: ollama/ollama:latest
    container_name: karigar-colab
    ports:
      - "11434:11434"
    environment:
      OLLAMA_KEEP_ALIVE: '-1'
    volumes:
      - ollama1:/root/.ollama
    networks:
      - karigar
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 30s
      timeout: 5s
      retries: 3

  # Mock Kaggle worker (T4/P100)
  ollama-2:
    image: ollama/ollama:latest
    container_name: karigar-kaggle
    ports:
      - "11435:11434"
    environment:
      OLLAMA_KEEP_ALIVE: '-1'
    volumes:
      - ollama2:/root/.ollama
    networks:
      - karigar
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 30s
      timeout: 5s
      retries: 3

  # Mock Oracle ARM worker
  ollama-3:
    image: ollama/ollama:latest
    container_name: karigar-oracle
    ports:
      - "11436:11434"
    environment:
      OLLAMA_KEEP_ALIVE: '-1'
    volumes:
      - ollama3:/root/.ollama
    networks:
      - karigar
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  ollama1:
  ollama2:
  ollama3:

networks:
  karigar:
    driver: bridge
